<div class="relative">
    <button
            class="max-w-60 py-3 px-6 flex items-center gap-1 hover:bg-zinc-100 border cursor-pointer"
            onclick="handleDropdownClick(event, 'profile-dropdown')"
    >
        <span class="truncate">{{user.name or user.email}}</span>
        <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="shrink-0 lucide lucide-chevron-down-icon lucide-chevron-down"
        >
            <path d="m6 9 6 6 6-6"/>
        </svg>
    </button>

    <div
            id="profile-dropdown"
            class="hidden absolute z-100 bg-white top-full mt-2 right-0 min-w-50 w-full py-2 flex flex-col border"
    >
        <a
                href="/me"
                class="w-full py-3 px-6 hover:bg-zinc-100"
        >Account</a>
        <a
                href="/auth/logout"
                class="text-start w-full py-3 px-6 text-red-500 hover:bg-red-500 hover:text-white"
        >Logout
        </a>
    </div>
</div>
