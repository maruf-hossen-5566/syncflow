<div
        class="relative"
        id="doc-dropdown"
>
    <button
            onclick="handleDropdownClick(event, 'doc-more-dropdown')"
            class="border size-12 flex items-center justify-center hover:bg-zinc-200 cursor-pointer"
    >
        <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-ellipsis-vertical-icon lucide-ellipsis-vertical"
        >
            <circle
                    cx="12"
                    cy="12"
                    r="1"
            />
            <circle
                    cx="12"
                    cy="5"
                    r="1"
            />
            <circle
                    cx="12"
                    cy="19"
                    r="1"
            />
        </svg>
    </button>
    <div
            id="doc-more-dropdown"
            class="hidden absolute z-100 bg-white top-full mt-2 right-0 min-w-max w-full py-2 flex flex-col border divide-y"
    >
        <div class="px-6 py-3 space-y-2 flex flex-col justify-end">
            <span class="">Who can view and edit this document</span>
            <label
                    class="hidden"
                    for="who-can-access"
            >Select</label>
            <select
                    id="who-can-access"
                    hx-post="/documents/{{doc.id}}/update"
                    hx-include="#who-can-access"
                    name="access"
                    hx-swap="outerHTML"
                    hx-target="#doc-dropdown"
                    hx-trigger="change"
                    class="-ml-1 w-max hover:bg-zinc-200 py-1 opacity-50 hover:opacity-100 outline-none"
            >
                <option
                        {%
                        if
                        doc.access_only_me%}
                        selected
                        {%
                        endif
                        %}
                        value="only_me"
                >Only I can

                </option>
                <option
                        {%
                        if
                        not
                        doc.access_only_me%}
                        selected
                        {%
                        endif
                        %}
                        value="any_one"
                >Any document member
                </option>
            </select>
        </div>
        <button
                class="w-full mt-2 py-3 px-6 text-start hover:bg-zinc-100 flex items-center gap-2 cursor-pointer"
                onclick="handleShareClick(event, '{{doc.id}}')"
        >
            <span>Share</span>
            <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-external-link-icon lucide-external-link"
            >
                <path d="M15 3h6v6"/>
                <path d="M10 14 21 3"/>
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            </svg>
        </button>
    </div>
</div>
