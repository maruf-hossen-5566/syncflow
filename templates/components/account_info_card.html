<div
	id="account-info-card"
	class="border p-6 space-y-6">
	{% if errors %} {% include "components/messages.html" %} {% endif %} {% if
	user %}
	<h2 class="text-xl font-semibold">Account Information</h2>
	<form
		method="post"
		class="w-full mx-auto flex flex-col gap-8">
		<div class="w-full flex flex-col gap-2">
			<label for="name">Name</label>
			<input
				id="name"
				name="name"
				type="text"
				class="w-full p-3 border"
				placeholder="John Doe"
				value="{{user.name or ''}}" />
		</div>
		<div class="w-full flex flex-col gap-2">
			<label for="email">Email</label>
			<input
				id="email"
				name="email"
				type="email"
				class="w-full p-3 border disabled:opacity-50 disabled:cursor-not-allowed"
				placeholder="user@example.com"
				value="{{user.email}}"
				disabled />
		</div>

		<button
			hx-trigger="click"
			hx-post="/me"
			hx-target="#account-info-card"
			hx-swap="outerHTML"
			class="p-4 ml-auto bg-zinc-900 text-white cursor-pointer">
			Update
		</button>
	</form>
</div>
{% endif %}
