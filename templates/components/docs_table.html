<div
        class="docs_table_container"
>
    {% if docs|length > 0 %}
    <div
            class="my-12 w-full grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
    >
        {% for doc in docs %}
        {% with index=loop.index %}
        {% include "components/doc_card.html" %}
        {% endwith %}
        {% endfor %}
    </div>
    {% if total_docs > 12 %}
    {% include "components/pagination.html" %}
    {% endif %}
    {% else %}
    <div class="border p-4 w-full h-90 flex items-center justify-center">
        No documents
    </div>
    {% endif %}

</div>
